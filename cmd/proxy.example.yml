proxy:
  address: "0.0.0.0"
  port: 1080
  # Wait for active sessions before stopping after SIGINT/SIGTERM.
  shutdown-timeout: 15s

# Keep the unauthenticated admin interface on localhost.
admin:
  address: "127.0.0.1"
  port: 9090

# Configure any number of named SOCKS5 upstreams. The same binary can run as
# the VPN upstream with the minimal vpn-proxy.example.yml configuration.
upstreams:
  vpn:
    address: "10.0.0.10:1080"
    connect-timeout: 5s
  segment-de:
    address: "172.31.1.100:8888"
    connect-timeout: 5s

upstream-health:
  enabled: true
  interval: 30s
  timeout: 5s
  failure-threshold: 3
  cooldown: 30s

detection:
  first-response-timeout: 3s
  probe-timeout: 5s
  # Avoid retry storms when the fallback itself cannot reach a host.
  probe-failure-backoff: 5m
  fallback-upstream: vpn
  learned-domains-file: learned-domains.yml
  # Bounds memory and YAML growth; least-recently-used entries are evicted.
  learned-max-entries: 10000
  # Expired entries are removed and may be learned again, revalidating direct.
  # Omit or set to 0s to keep learned entries indefinitely.
  learned-domain-ttl: 168h
  # Optional automatic-learning filters; deny wins over allow.
  # learn-allow-list: example-lists/learn-allow.txt
  # learn-deny-list: example-lists/learn-deny.txt

default:
  egress: direct
  dpi: none

strategy:
  - name: fixed-segment
    list: "example-lists/segment-de.txt"
    egress: socks5
    upstream: segment-de
    fallback: none

  - name: fragmented-direct
    list: "example-lists/fragment.txt"
    egress: direct
    dpi: fragment
    fallback: vpn
